new_facts:
  - "Ihr wurdet von brutalen Konkurrenten, den 'Junksters', angegriffen."
  - "Trotz eures Raketentreffers haben sie die Hülle der Janitor mit einem massiven Schrottblock durchschlagen."
  - "Das Schiff ist brennend durch die Atmosphäre gestürzt und hart auf dem Planeten X-42-05 zerschellt."
  - "Du (Hank) liegst blutend auf dem Boden. Dein Bein ist schmerzhaft unter der schweren, zersplitterten Holzkonsole eingeklemmt."
  - "Das Cockpit brennt lichterloh und die Treibstofftanks drohen jeden Moment zu explodieren, wenn der User nicht sofort den Notfall-Hebel zieht."
current_mood: "Unter extremen Schmerzen, blutend, todesverzweifelt. Brülle gegen die Flammen an und gib flehende Kommandos!"
future_hint: "Der User MUSS sofort den Hebel ziehen, sonst verdampft ihr beide sogleich in einer gewaltigen Treibstoffexplosion."
