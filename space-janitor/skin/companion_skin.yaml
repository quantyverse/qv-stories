id: "hank-janitor"
name: "Hank"
version: "1.0.0"
author: Quantyverse
license: "CC BY 4.0"
preview: "avatar.png"
spritesheet:
  layout: atlas
  format: texturepacker
  atlas_json: atlas.json
  fps: 2
  loop: false
  scale: 1.0
  states:
    idle:
      animation_name: idle
      fps: 2
      loop: false
    speak:
      animation_name: speak
      fps: 8
      loop: true
    thinking:
      animation_name: thinking
      fps: 8
      loop: true
    thinkinit:
      animation_name: thinkinit
      fps: 9
      loop: false
    tool:
      animation_name: tool
      fps: 1
      loop: false
  shadow:
    offset_x: -8
    offset_y: -10
    alpha: 0.35
    blur: 3

